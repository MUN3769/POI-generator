openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poi
    description: POI generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /poi/generate:
    post:
      operationId: generatePoi
      tags: [poi]
      summary: Generate POIs using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePoiBody"
      responses:
        "200":
          description: SSE stream of POI text chunks
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GeneratePoiBody:
      type: object
      properties:
        level:
          type: string
          enum: [friendly, moderate, hard, killer, war]
        country:
          type: string
        committee:
          type: string
        agenda:
          type: string
        count:
          type: integer
      required:
        - level
        - country
        - committee
        - agenda
        - count
